<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: linear-gradient(to bottom, #0f172a, #1e1040, #0f172a);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    position: relative;
}
.title {
    position: absolute;
    top: 4%;
    width: 100%;
    font-size: 38px;
    font-weight: bold;
    animation: glow 2s infinite alternate;
    z-index: 10;
}
@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d6d, 0 0 20px #c9184a; }
    to   { text-shadow: 0 0 30px #ff99ac, 0 0 60px #ff758f; }
}
.rose-container {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    animation: sway 5s ease-in-out infinite;
    transform-origin: bottom center;
}
@keyframes sway {
    0%   { transform: translateX(-50%) rotate(-3deg); }
    50%  { transform: translateX(-50%) rotate(3deg); }
    100% { transform: translateX(-50%) rotate(-3deg); }
}
.cake {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
}
.layer-top {
    width: 180px; height: 50px;
    background: linear-gradient(to bottom, #ff8fab, #ffb3c1);
    border-radius: 10px 10px 0 0;
    position: relative;
    margin: auto;
}
.layer-bottom {
    width: 220px; height: 65px;
    background: linear-gradient(to bottom, #ffccd5, #ffd6e0);
    border-radius: 0 0 12px 12px;
    margin: auto;
}
.candle {
    width: 10px; height: 32px;
    background: linear-gradient(to bottom, #fff, #e0e0e0);
    border-radius: 3px 3px 0 0;
    position: absolute;
    top: -32px;
}
.c1 { left: 30px; } .c2 { left: 85px; } .c3 { left: 140px; }
.flame {
    width: 12px; height: 18px;
    background: radial-gradient(ellipse at 50% 80%, #fff700, #ff8c00, transparent);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: absolute;
    top: -18px; left: -1px;
    animation: flicker 0.15s infinite alternate;
}
@keyframes flicker {
    from { transform: scale(1) rotate(-3deg); opacity: 1; }
    to   { transform: scale(1.2) rotate(3deg); opacity: 0.85; }
}
.falling-flower {
    position: absolute;
    pointer-events: none;
    animation: fall linear infinite;
}
@keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="title">🎉 Happy Birthday 🎉</div>

<div class="rose-container">
<svg width="180" height="230" viewBox="0 0 180 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="petalG1" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff758f"/>
      <stop offset="60%" stop-color="#c9184a"/>
      <stop offset="100%" stop-color="#7a001f"/>
    </radialGradient>
    <radialGradient id="petalG2" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="55%" stop-color="#a4133c"/>
      <stop offset="100%" stop-color="#590d22"/>
    </radialGradient>
    <radialGradient id="petalG3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffb3c1"/>
      <stop offset="50%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#800f2f"/>
    </radialGradient>
    <radialGradient id="coreG" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffccd5"/>
      <stop offset="40%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#590d22"/>
    </radialGradient>
    <radialGradient id="leafG" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </radialGradient>
    <linearGradient id="stemG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="50%" stop-color="#40916c"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
  </defs>

  <!-- Stem -->
  <path d="M90 178 Q85 195 88 220" stroke="url(#stemG)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Leaves -->
  <g transform="translate(88,195) rotate(-30)">
    <ellipse cx="0" cy="-18" rx="14" ry="22" fill="url(#leafG)" opacity="0.9"/>
    <path d="M0,0 Q4,-18 0,-36" stroke="#1b4332" stroke-width="1" fill="none"/>
  </g>
  <g transform="translate(90,200) rotate(40)">
    <ellipse cx="0" cy="-16" rx="12" ry="20" fill="url(#leafG)" opacity="0.85"/>
    <path d="M0,0 Q-3,-16 0,-32" stroke="#1b4332" stroke-width="1" fill="none"/>
  </g>

  <!-- Outer petals layer -->
  <g transform="translate(90,108)">
    <ellipse cx="0" cy="-38" rx="22" ry="38" fill="url(#petalG2)" opacity="0.88" transform="rotate(0)"/>
    <ellipse cx="0" cy="-38" rx="22" ry="38" fill="url(#petalG2)" opacity="0.88" transform="rotate(72)"/>
    <ellipse cx="0" cy="-38" rx="22" ry="38" fill="url(#petalG2)" opacity="0.88" transform="rotate(144)"/>
    <ellipse cx="0" cy="-38" rx="22" ry="38" fill="url(#petalG2)" opacity="0.88" transform="rotate(216)"/>
    <ellipse cx="0" cy="-38" rx="22" ry="38" fill="url(#petalG2)" opacity="0.88" transform="rotate(288)"/>
  </g>

  <!-- Mid petals layer -->
  <g transform="translate(90,108)">
    <ellipse cx="0" cy="-30" rx="18" ry="32" fill="url(#petalG1)" opacity="0.93" transform="rotate(36)"/>
    <ellipse cx="0" cy="-30" rx="18" ry="32" fill="url(#petalG1)" opacity="0.93" transform="rotate(108)"/>
    <ellipse cx="0" cy="-30" rx="18" ry="32" fill="url(#petalG1)" opacity="0.93" transform="rotate(180)"/>
    <ellipse cx="0" cy="-30" rx="18" ry="32" fill="url(#petalG1)" opacity="0.93" transform="rotate(252)"/>
    <ellipse cx="0" cy="-30" rx="18" ry="32" fill="url(#petalG1)" opacity="0.93" transform="rotate(324)"/>
  </g>

  <!-- Inner curled petals -->
  <g transform="translate(90,105)">
    <path d="M0,-8 C-12,-20 -14,-36 -4,-42 C6,-38 12,-22 6,-8 Z" fill="url(#petalG3)" opacity="0.95" transform="rotate(0)"/>
    <path d="M0,-8 C-12,-20 -14,-36 -4,-42 C6,-38 12,-22 6,-8 Z" fill="url(#petalG3)" opacity="0.95" transform="rotate(60)"/>
    <path d="M0,-8 C-12,-20 -14,-36 -4,-42 C6,-38 12,-22 6,-8 Z" fill="url(#petalG3)" opacity="0.95" transform="rotate(120)"/>
    <path d="M0,-8 C-12,-20 -14,-36 -4,-42 C6,-38 12,-22 6,-8 Z" fill="url(#petalG3)" opacity="0.95" transform="rotate(180)"/>
    <path d="M0,-8 C-12,-20 -14,-36 -4,-42 C6,-38 12,-22 6,-8 Z" fill="url(#petalG3)" opacity="0.95" transform="rotate(240)"/>
    <path d="M0,-8 C-12,-20 -14,-36 -4,-42 C6,-38 12,-22 6,-8 Z" fill="url(#petalG3)" opacity="0.95" transform="rotate(300)"/>
  </g>

  <!-- Core -->
  <circle cx="90" cy="104" r="18" fill="url(#coreG)"/>
  <circle cx="90" cy="104" r="10" fill="#ffb3c1" opacity="0.6"/>
  <circle cx="90" cy="104" r="5"  fill="#fff" opacity="0.25"/>
</svg>
</div>

<!-- Cake -->
<div class="cake">
  <div class="layer-top">
    <div class="candle c1"><div class="flame"></div></div>
    <div class="candle c2"><div class="flame"></div></div>
    <div class="candle c3"><div class="flame"></div></div>
  </div>
  <div class="layer-bottom"></div>
</div>

<script>
function createRosePetal() {
  const el = document.createElement('div');
  el.classList.add('falling-flower');
  const size = 18 + Math.random() * 16;
  el.style.left = Math.random() * window.innerWidth + 'px';
  el.style.top = '-60px';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.animationDuration = (4 + Math.random() * 5) + 's';

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox','0 0 40 40');

  const colors = ['#ff4d6d','#c9184a','#ff758f','#ffb3c1','#ff8fab','#a4133c'];
  const col = colors[Math.floor(Math.random()*colors.length)];
  const col2 = colors[Math.floor(Math.random()*colors.length)];
  const gId = 'pg' + Math.floor(Math.random()*999999);

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `<radialGradient id="${gId}" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="${col}"/>
    <stop offset="100%" stop-color="${col2}"/>
  </radialGradient>`;
  svg.appendChild(defs);

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform','translate(20,20)');

  for(let i=0;i<5;i++){
    const p = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    p.setAttribute('cx','0');
    p.setAttribute('cy','-10');
    p.setAttribute('rx','7');
    p.setAttribute('ry','12');
    p.setAttribute('fill',`url(#${gId})`);
    p.setAttribute('opacity','0.88');
    p.setAttribute('transform',`rotate(${i*72})`);
    g.appendChild(p);
  }
  const core = document.createElementNS('http://www.w3.org/2000/svg','circle');
  core.setAttribute('cx','0'); core.setAttribute('cy','0');
  core.setAttribute('r','6'); core.setAttribute('fill',col);
  g.appendChild(core);
  svg.appendChild(g);
  el.appendChild(svg);
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 9000);
}

setInterval(createRosePetal, 400);
</script>

</body>
</html>
